# 自动部署 Vite 项目到 GitHub Pages
name: Deploy Vite App to GitHub Pages

on:
  # 当代码推送到 main 分支时触发运行（如果你的分支叫 master，就把 main 改成 master）
  push:
    branches: ["main"]

# 设置权限以允许 GitHub Token 部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 确保不会同时有两个部署任务在跑
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖 (npm install)
        run: npm install

      - name: 打包构建 (npm run build)
        run: npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传打包后的文件 (dist 文件夹)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 部署到 GitHub Pages! 🚀
        id: deployment
        uses: actions/deploy-pages@v4
